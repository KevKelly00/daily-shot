<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crema — Dashboard</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .dash-greeting {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    .tile {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
    }
    .tile-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }
    /* Streak */
    .streak-body { display: flex; align-items: center; justify-content: space-between; }
    .streak-num  { font-size: 2.8rem; font-weight: 800; letter-spacing: -2px; line-height: 1; }
    .streak-unit { font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-left: 4px; }
    .streak-hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .streak-right { text-align: right; }
    .streak-flame { font-size: 2rem; line-height: 1; }
    .streak-best  { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .streak-best strong { color: var(--text); }
    /* Beans */
    .bean-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .bean-row:last-child { border-bottom: none; padding-bottom: 0; }
    .bean-row:first-child { padding-top: 0; }
    .bean-name {
      font-size: 0.875rem;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }
    .bean-age {
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--bg);
    }
    .bean-age.fresh { color: var(--muted); }
    .bean-age.peak  { color: #16a34a; }
    .bean-age.old   { color: #d97706; }
    .bean-empty { font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">crema</span>
    <img class="topnav-avatar" id="userAvatar" src="" alt="Profile"
      onerror="this.style.display='none'" onclick="window.location.href='/profile.html'" />
  </nav>

  <main class="page" style="gap:12px; display:flex; flex-direction:column;">

    <div class="dash-greeting" id="greeting">Hey there ☕</div>

    <div class="stats-grid" style="margin-bottom:0">
      <div class="stat-card">
        <div class="stat-label">Home brews</div>
        <div class="stat-value" id="statTotal"><div class="spinner"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This week</div>
        <div class="stat-value" id="statWeek"><div class="spinner"></div></div>
        <div class="stat-sub">All posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg art rating</div>
        <div class="stat-value" id="statRating"><div class="spinner"></div></div>
        <div class="stat-sub">Home pours only</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">AI high score</div>
        <div class="stat-value" id="statAiBest"><div class="spinner"></div></div>
        <div class="stat-sub">Personal best</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cafes visited</div>
        <div class="stat-value" id="statCafes"><div class="spinner"></div></div>
        <div class="stat-sub">Unique cafes</div>
      </div>
    </div>

    <div class="tile" id="streakTile">
      <div class="tile-label">Brew streak</div>
      <div class="streak-body">
        <div>
          <div style="display:flex;align-items:baseline">
            <span class="streak-num" id="streakCurrent">—</span>
            <span class="streak-unit">days</span>
          </div>
          <div class="streak-hint" id="streakHint"></div>
        </div>
        <div class="streak-right">
          <div class="streak-flame">🔥</div>
          <div class="streak-best">Best <strong id="streakBest">—</strong></div>
        </div>
      </div>
    </div>

    <div class="tile">
      <div class="tile-label">Beans in rotation</div>
      <div id="beansList"><div class="loading-wrap" style="padding:8px 0"><div class="spinner"></div></div></div>
    </div>

  </main>

  <nav class="bottomnav">
    <a href="/dashboard.html" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21v-8h6v8"/></svg>
      Home
    </a>
    <a href="/feed.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>
      Feed
    </a>
    <a href="/log.html" class="log-btn">
      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    </a>
    <a href="/library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Library
    </a>
    <a href="/profile.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Profile
    </a>
  </nav>

  <script type="module">
    import { loadDashboard } from '/js/dashboard.js';
    loadDashboard();
  </script>
</body>
</html>
