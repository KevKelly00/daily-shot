<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crema — Library</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">Library</span>
    <span></span>
  </nav>

  <main class="page" style="padding-left:0;padding-right:0;">
    <div id="photoGrid" class="photo-grid">
      <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </main>

  <nav class="bottomnav">
    <a href="/dashboard.html"><span class="nav-icon">🏠</span>Home</a>
    <a href="/feed.html"><span class="nav-icon">🌍</span>Feed</a>
    <a href="/log.html" class="log-btn"><span>+</span></a>
    <a href="/library.html" class="active"><span class="nav-icon">📚</span>Library</a>
    <a href="/profile.html"><span class="nav-icon">👤</span>Profile</a>
  </nav>

  <script type="module">
    import { supabase, requireAuth } from '/js/auth.js';

    const session = await requireAuth();
    const userId  = session.user.id;

    const { data: logs, error } = await supabase
      .from('coffee_logs')
      .select('id, photo_url, art_style')
      .eq('user_id', userId)
      .order('created_at', { ascending: false });

    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';

    if (error || !logs || logs.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">📷</div>
          <p>No brews logged yet.<br>Tap + to log your first coffee.</p>
        </div>`;
      return;
    }

    logs.forEach(log => {
      const item = document.createElement('div');
      item.addEventListener('click', () => window.location.href = `/log-detail.html?id=${log.id}`);

      if (log.photo_url) {
        item.className = 'photo-grid-item';
        const img = document.createElement('img');
        img.src     = log.photo_url;
        img.alt     = log.art_style || '';
        img.loading = 'lazy';
        item.appendChild(img);
      } else {
        item.className = 'photo-grid-placeholder';
        item.textContent = '☕';
      }
      grid.appendChild(item);
    });
  </script>
</body>
</html>
