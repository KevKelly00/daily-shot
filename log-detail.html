<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crema — Brew</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .detail-photo {
      width: 100%;
      height: auto;
      display: block;
      background: var(--surface);
    }
    .detail-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .detail-body { padding: 14px 16px 0; display: flex; flex-direction: column; gap: 12px; }
    .btn-delete {
      flex-shrink: 0;
      width: 44px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .btn-delete:hover { opacity: 0.85; }
    .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }
    .art-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .detail-date { color: var(--muted); font-size: 0.78rem; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .detail-field { display: flex; flex-direction: column; gap: 3px; }
    .detail-field-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-field-value { font-size: 0.9rem; }
    .stars-display { display: flex; gap: 2px; font-size: 1rem; }
    .detail-notes {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--text);
    }
    .owner-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
    }
    .owner-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--border);
      object-fit: cover;
    }
    .owner-name { font-size: 0.82rem; font-weight: 600; flex: 1; }
    .ai-section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ai-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .ai-rating-score {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .ai-tips {
      padding: 10px 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .btn-ai {
      width: 100%;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-ai:hover { background: var(--border); }
    .btn-ai:disabled { opacity: 0.5; cursor: default; }
    .community-section {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .community-avg {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .community-avg-sub { font-size: 0.82rem; font-weight: 400; color: var(--muted); }
    .community-stars {
      display: flex;
      gap: 6px;
    }
    .community-stars .star-wrap {
      position: relative;
      width: 32px; height: 32px;
      cursor: pointer;
    }
    .community-stars .star-wrap svg {
      width: 32px; height: 32px;
      pointer-events: none;
    }
    .community-stars .half-l,
    .community-stars .half-r {
      position: absolute;
      top: 0; height: 100%;
      width: 50%;
    }
    .community-stars .half-l { left: 0; }
    .community-stars .half-r { right: 0; }
    .your-rating-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .your-rating-value { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
    .btn-rate {
      align-self: flex-start;
      padding: 8px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-rate:disabled { opacity: 0.4; cursor: not-allowed; }
    .comments-section {
      border-top: 1px solid var(--border);
      padding: 14px 16px calc(var(--nav-h) + 24px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .comments-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .comment-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .comment-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-username { font-size: 0.8rem; font-weight: 600; }
    .comment-text { font-size: 0.875rem; line-height: 1.45; margin-top: 2px; word-break: break-word; }
    .comment-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; }
    .comment-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.72rem; padding: 0; }
    .comment-delete:hover { color: var(--danger); }
    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .comment-input-row .input { flex: 1; padding: 10px 12px; font-size: 0.875rem; }
    .comment-post-btn {
      padding: 10px 14px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .comment-post-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>

      Home

    <a href="/feed.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>

      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>

</body>
</html>
