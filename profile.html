<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crema — Profile</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .profile-stat { text-align: center; }
    .profile-stat-num  { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .profile-stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    #viewMode, #editMode { display: flex; flex-direction: column; gap: 16px; }
    #editMode { display: none; }
    .edit-actions { display: flex; gap: 10px; }
    .edit-actions .btn { flex: 1; }

    .section-heading {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .beans-section {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bean-list { display: flex; flex-direction: column; gap: 8px; }
    .bean-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: var(--radius);
      font-size: 0.9rem;
    }
    .bean-archive-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 0 0 12px;
      line-height: 1;
    }
    .bean-archive-btn:hover { color: var(--text); }
    .bean-add-row {
      display: flex;
      gap: 8px;
    }
    .bean-add-row .input { flex: 1; }
    .bean-add-btn {
      padding: 0 16px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .bean-add-btn:disabled { opacity: 0.5; }
    .bean-empty { font-size: 0.88rem; color: var(--muted); }
    .bean-item-name  { font-size: 0.9rem; }
    .bean-item-roast { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">Profile</span>
    <span></span>
  </nav>

  <main class="page">

    <div class="profile-header" id="profileHeader">
      <img class="profile-avatar" id="profileAvatar" src="" alt=""
        onerror="this.style.background='var(--border)';this.removeAttribute('src')" />
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-bio"  id="profileBio"></div>
      <div style="font-size:0.82rem; color:var(--muted)" id="profileEmail"></div>
    </div>

    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num"  id="statBrews">—</div>
        <div class="profile-stat-label">Brews</div>
      </div>
      <div class="profile-stat" onclick="showUserList('followers')">
        <div class="profile-stat-num"  id="statFollowers">—</div>
        <div class="profile-stat-label">Followers</div>
      </div>
      <div class="profile-stat" onclick="showUserList('following')">
        <div class="profile-stat-num"  id="statFollowing">—</div>
        <div class="profile-stat-label">Following</div>
      </div>
    </div>

    <!-- View mode -->
    <div id="viewMode">
      <button class="btn btn-ghost" onclick="startEdit()">Edit profile</button>
      <button class="btn btn-ghost" id="notifBtn" style="display:none"></button>
      <button class="btn btn-ghost" id="signOutBtn">Sign out</button>
    </div>

    <!-- Edit mode -->
    <div id="editMode">
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <img id="editAvatar" class="profile-avatar" src="" alt=""
          onerror="this.style.background='var(--border)';this.removeAttribute('src')"
          style="width:80px;height:80px;cursor:pointer" onclick="document.getElementById('avatarInput').click()" />
        <label for="avatarInput" style="font-size:0.82rem;color:var(--muted);cursor:pointer;text-decoration:underline">Change photo</label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" />
      </div>
      <div class="form-group">
        <label>Display name</label>
        <input class="input" id="editName"     type="text"  placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input class="input" id="editUsername" type="text"  placeholder="@username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Bio</label>
        <input class="input" id="editBio"      type="text"  placeholder="Home barista, obsessed with tulips…" />
      </div>
      <div class="error-msg" id="editError"></div>
      <div class="edit-actions">
        <button class="btn btn-ghost"    onclick="cancelEdit()">Cancel</button>
        <button class="btn btn-primary"  id="saveBtn" onclick="saveProfile()">Save</button>
      </div>
    </div>

    <!-- Bean inventory -->
    <div class="beans-section">
      <div class="section-heading">Bean inventory</div>
      <div class="bean-list" id="beanList">
        <div class="bean-empty">Loading…</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <input class="input" id="beanInput" type="text" placeholder="e.g. Has Bean — Ethiopia Yirgacheffe" />
        <div class="bean-add-row">
          <input class="input" id="beanRoastDate" type="date" style="flex:1" />
          <button class="bean-add-btn" id="beanAddBtn" onclick="addBean()">Add</button>
        </div>
      </div>
    </div>

  </main>

  <nav class="bottomnav">
    <a href="/dashboard.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21v-8h6v8"/></svg>
      Home
    </a>
    <a href="/feed.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>
      Feed
    </a>
    <a href="/log.html" class="log-btn">
      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    </a>
    <a href="/library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Library
    </a>
    <a href="/profile.html" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Profile
    </a>
  </nav>

  <div class="user-list-overlay" id="userListOverlay">
    <div class="user-list-sheet">
      <div class="user-list-header">
        <span id="userListTitle">Followers</span>
        <button class="user-list-close" id="userListClose">×</button>
      </div>
      <div class="user-list-items" id="userListItems"></div>
    </div>
  </div>

  <script type="module">
    import { loadProfile } from '/js/profile.js';
    loadProfile();
  </script>
</body>
</html>
