<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Shot — Pending Approval</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap" style="justify-content:center; align-items:center; text-align:center; gap:24px;">
    <div>
      <div style="font-size:2.5rem; font-weight:800; letter-spacing:-2px; margin-bottom:8px;">daily shot</div>
      <div style="color:var(--muted); font-size:0.9rem;">Your account is pending approval.</div>
      <div style="color:var(--muted); font-size:0.9rem; margin-top:6px;">You'll be able to log in once approved.</div>
    </div>
    <button class="btn btn-ghost" id="signOutBtn" style="max-width:200px">Sign out</button>
  </div>
  <script type="module">
    import { signOut } from '/js/auth.js';
    document.getElementById('signOutBtn').addEventListener('click', signOut);
  </script>
