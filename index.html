<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Shot</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Shot" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>daily shot</h1>
      <p>Your daily shot, captured.</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign in</div>
        <div class="auth-tab"        id="tabSignUp" onclick="switchTab('signup')">Create account</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form class="auth-form" id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" type="submit" id="submitBtn">Sign in</button>
      </form>

      <div class="auth-divider">or</div>

      <button class="btn btn-ghost" id="googleBtn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <script type="module">
    import { requireGuest, signInWithEmail, signUpWithEmail, signInWithGoogle } from '/js/auth.js';
    await requireGuest();

    let mode = 'signin';

    window.switchTab = function(tab) {
      mode = tab;
      document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
      document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
      document.getElementById('submitBtn').textContent = tab === 'signin' ? 'Sign in' : 'Create account';
      document.getElementById('password').autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
      hideError();
    };

    window.handleSubmit = async function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Please wait…';
      hideError();

      const fn = mode === 'signin' ? signInWithEmail : signUpWithEmail;
      const { data, error } = await fn(email, password);

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = mode === 'signin' ? 'Sign in' : 'Create account';
        return;
      }
      if (mode === 'signup' && data.user && !data.session) {
        showError('Check your email to confirm your account, then sign in.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
        switchTab('signin');
        return;
      }
      window.location.href = '/dashboard.html';
    };

    window.handleGoogle = async function() {
      document.getElementById('googleBtn').disabled = true;
      const { error } = await signInWithGoogle();
      if (error) { showError(error.message); document.getElementById('googleBtn').disabled = false; }
    };

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
    function hideError()    { document.getElementById('errorMsg').style.display = 'none'; }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
