<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crema — Feed</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .feed-tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 9;
    }
    .feed-tab {
      flex: 1;
      padding: 11px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: all 0.15s;
      letter-spacing: -0.1px;
    }
    .feed-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .brew-card { background: var(--card); border-bottom: 1px solid var(--border); }
    .brew-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; }
    .brew-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface);
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }
    .brew-username { font-weight: 600; font-size: 0.875rem; cursor: pointer; }
    .brew-username:hover { opacity: 0.7; }
    .brew-date { font-size: 0.75rem; color: var(--muted); }
    .follow-btn {
      margin-left: auto;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
      width: auto;
    }
    .follow-btn.following { background: var(--surface); }
    .follow-btn:hover { background: var(--surface); }
    .brew-photo { width: 100%; height: auto; display: block; cursor: pointer; }
    .brew-photo-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      color: var(--border);
      cursor: pointer;
    }
    .brew-card-footer { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 6px; }
    .brew-style-badge {
      display: inline-flex;
      align-items: center;
      background: var(--surface);
      color: var(--text-2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .brew-ratings { display: flex; gap: 12px; font-size: 0.8rem; color: var(--muted); }
    .brew-notes {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #feedList { padding-bottom: calc(var(--nav-h) + 16px); }
    .card-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .like-btn, .comment-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.12s;
    }
    .like-btn:hover, .comment-btn:hover { color: var(--text); }
    .like-btn.liked { color: #e0365a; }
    .like-btn .heart-outline { display: block; }
    .like-btn .heart-filled  { display: none; }
    .like-btn.liked .heart-outline { display: none; }
    .like-btn.liked .heart-filled  { display: block; }
    .card-avg-rating {
      margin-left: auto;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 3px;
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <span class="topnav-logo">crema</span>
    <span></span>
  </nav>

  <div class="feed-tabs">
    <div class="feed-tab active" id="tabAll"       onclick="switchTab('all')">All brews</div>
    <div class="feed-tab"        id="tabFollowing" onclick="switchTab('following')">Following</div>
  </div>

  <div id="feedList">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
  <div id="feedSentinel" style="height:1px"></div>

  <nav class="bottomnav">
    <a href="/dashboard.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21v-8h6v8"/></svg>
      Home
    </a>
    <a href="/feed.html" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>
      Feed
    </a>
    <a href="/log.html" class="log-btn">
      <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    </a>
    <a href="/library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Library
    </a>
    <a href="/profile.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Profile
    </a>
  </nav>

  <script type="module">
    import { loadFeed } from '/js/feed.js';
    loadFeed();
  </script>
</body>
</html>
